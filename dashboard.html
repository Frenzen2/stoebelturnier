<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stöbelturnier 2026 – Beamer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@600;700;900&display=swap');
* { box-sizing:border-box; margin:0; padding:0; }

/* ── 4K canvas, scaled by JS ── */
html { width:100vw; height:100vh; overflow:hidden; background:#e8e8e8; }
body {
  width:3840px; height:2160px; overflow:hidden;
  background:#f0f0f0; color:#111;
  font-family:'Inter',sans-serif;
  transform-origin:top left;
}

/* ── Layout: header / content / sponsors ── */
.layout { display:grid; grid-template-rows:160px 1fr 190px; height:2160px; }

/* ── Header ── */
header {
  background:linear-gradient(90deg,#8f0f10,#c0181a 50%,#8f0f10);
  border-bottom:6px solid #6d0000;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 80px;
  box-shadow:0 4px 40px rgba(0,0,0,0.3);
}
.h-left { display:flex; align-items:center; gap:40px; }
.h-title { font-family:'Bebas Neue',sans-serif; font-size:5.5rem; color:#fff; letter-spacing:6px; text-shadow:0 2px 8px rgba(0,0,0,0.4); }
.h-right { display:flex; align-items:center; gap:60px; }
.h-round-label { font-size:1.4rem; font-weight:600; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:4px; }
.h-round-num { font-family:'Bebas Neue',sans-serif; font-size:7rem; color:#fff; line-height:1; }
.h-clock { font-family:'Bebas Neue',sans-serif; font-size:5rem; color:#fff; letter-spacing:4px; }
.h-status { display:flex; align-items:center; gap:14px; }
.status-dot { width:18px; height:18px; border-radius:50%; background:#4cff88; flex-shrink:0; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-txt { font-size:1.2rem; color:rgba(255,255,255,0.7); letter-spacing:2px; }

/* ── Pairings panel ── */
.panel { padding:30px 50px 20px; display:flex; flex-direction:column; }
.panel-title {
  font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--accent,#c0181a);
  letter-spacing:4px; margin-bottom:16px; padding-bottom:12px;
  border-bottom:3px solid #c0181a; display:flex; align-items:center; gap:16px;
}
.panel-title span { font-family:'Inter',sans-serif; font-size:1.3rem; font-weight:600; color:#888; letter-spacing:1px; }
.pairing-grid { flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:14px; align-content:stretch; }

/* ── Pairing card ── */
.pc {
  background:#fff; border:2.5px solid #ccc; border-radius:10px;
  padding:10px 16px; display:grid; grid-template-rows:auto 1fr 1fr;
  overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.pc.open  { border-color:#c0181a; border-width:3px; }
.pc.done  { border-color:#bbb; background:#f5f5f5; opacity:0.6; }
.pc-field {
  font-family:'Bebas Neue',sans-serif; font-size:2rem; color:#c0181a;
  letter-spacing:3px; line-height:1; padding-bottom:5px;
  border-bottom:2px solid #ddd; margin-bottom:3px;
}
.pc-team-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:2px 0; }
.pc-team-row:first-of-type { border-bottom:1px solid #eee; }
.pc-team { font-family:'Bebas Neue',sans-serif; font-size:3.2rem; line-height:1.0; letter-spacing:0.5px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pc-score { font-family:'Bebas Neue',sans-serif; font-size:3.8rem; line-height:1; min-width:80px; text-align:right; flex-shrink:0; }
.pc-score.win  { color:#1a7a3c; }
.pc-score.loss { color:#aaa; }
.pc-score.open-s { color:#ccc; font-size:2rem; }
.pc-bye { display:flex; align-items:center; justify-content:center; color:#999; font-family:'Bebas Neue',sans-serif; font-size:2.5rem; }

/* ── Sponsors ── */
.sponsor-bar {
  background:#fff; border-top:4px solid #c0181a;
  display:flex; align-items:center; padding:0 80px; gap:50px; overflow:hidden;
}
.sponsor-label { font-size:1.1rem; font-weight:700; color:#c0181a; text-transform:uppercase; letter-spacing:3px; white-space:nowrap; flex-shrink:0; }
.sponsor-div { width:2px; height:60px; background:#ddd; flex-shrink:0; }
.sponsor-track { flex:1; overflow:hidden; height:160px; position:relative; }
.sponsor-slides { display:flex; align-items:center; height:100%; gap:0; }
.sponsor-slide { display:flex; align-items:center; justify-content:center; min-width:600px; height:150px; flex-shrink:0; padding:20px 60px; border-right:1px solid #eee; }
.sponsor-slide img { max-height:110px; max-width:400px; object-fit:contain; }
.sponsor-name { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; color:#c0181a; letter-spacing:4px; white-space:nowrap; }

/* ── Standings overlay – TRUE FULLSCREEN, outside scaled body ── */
#standings-overlay {
  display:none; position:fixed; inset:0; z-index:99999;
  background:#f2ede6; flex-direction:column;
  width:100vw; height:100vh;
  transform:none !important;
}
#standings-overlay.visible { display:flex; }
.so-header {
  background:linear-gradient(90deg,#8f0f10,#c0181a 50%,#8f0f10);
  height:10vh; display:flex; align-items:center; justify-content:space-between;
  padding:0 4vw; flex-shrink:0;
}
.so-title { font-family:'Bebas Neue',sans-serif; font-size:4.5vh; color:#fff; letter-spacing:0.4vw; }
.so-sub   { font-family:'Bebas Neue',sans-serif; font-size:2.8vh; color:rgba(255,255,255,0.7); letter-spacing:0.3vw; }
.so-body  { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:2vw; padding:2vh 3vw; overflow:hidden; }
.so-col   { display:flex; flex-direction:column; gap:0.8vh; overflow:hidden; }
.so-row {
  display:grid; grid-template-columns:5vw 1fr 8vw 7vw 10vw;
  align-items:center; gap:1vw; padding:0.7vh 2vw;
  background:#fff; border-radius:0.6vw; border-left:0.5vw solid #ddd;
  box-shadow:0 1px 4px rgba(0,0,0,0.08); flex-shrink:0;
}
.so-row.zt { border-left-color:#b8860b; background:#fffdf0; }
.so-row.zm { border-left-color:#1a7a3c; background:#f0fff4; }
.so-row.zb { border-left-color:#c0181a; background:#fff0f0; }
.so-rank { font-family:'Bebas Neue',sans-serif; font-size:3vh; color:#bbb; text-align:center; line-height:1; }
.so-rank.r1 { color:#b8860b; font-size:3.8vh; }
.so-rank.r2 { color:#888;    font-size:3.4vh; }
.so-rank.r3 { color:#a06828; font-size:3.2vh; }
.so-name { font-family:'Bebas Neue',sans-serif; font-size:2.8vh; color:#1a1a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1; }
.so-pts  { font-family:'Bebas Neue',sans-serif; font-size:2.8vh; color:#c0181a; text-align:right; line-height:1; }
.so-diff { font-family:'Bebas Neue',sans-serif; font-size:2vh;   text-align:right; line-height:1; }
.so-rec  { font-size:1.5vh; font-weight:700; color:#888; text-align:right; }
</style>
</head>
<body>

<div class="layout">
  <!-- HEADER -->
  <header>
    <div class="h-left">
      <img src="stoebel.png" alt="" style="height:120px;object-fit:contain" onerror="this.style.display='none'">
      <div class="h-title" id="h-title">🔥 Stöbelturnier 2026</div>
    </div>
    <div class="h-right">
      <div class="h-status">
        <div class="status-dot" id="status-dot" style="background:#e74c3c"></div>
        <span class="status-txt" id="status-txt">Verbinde...</span>
      </div>
      <div style="text-align:right">
        <div class="h-round-label">Runde</div>
        <div class="h-round-num" id="h-round">–</div>
      </div>
      <div class="h-clock" id="h-clock">00:00</div>
    </div>
  </header>

  <!-- PAARUNGEN -->
  <div class="panel">
    <div class="panel-title">
      🎯 Aktuelle Paarungen
      <span id="open-count"></span>
    </div>
    <div class="pairing-grid" id="pairing-grid">
      <div style="color:#999;font-size:2rem;padding:40px;grid-column:1/-1">Lade...</div>
    </div>
  </div>

  <!-- SPONSORS -->
  <div class="sponsor-bar">
    <div class="sponsor-label">Unsere Sponsoren</div>
    <div class="sponsor-div"></div>
    <div class="sponsor-track">
      <div class="sponsor-slides" id="sponsor-slides"></div>
    </div>
  </div>
</div>

<!-- STANDINGS OVERLAY – outside body scale! -->
<div id="standings-overlay">
  <div class="so-header">
    <div class="so-title">🏆 Aktuelle Tabelle</div>
    <div class="so-sub">Runde <span id="so-round">–</span> · Stöbelturnier 2026</div>
  </div>
  <div class="so-body">
    <div class="so-col" id="so-left"></div>
    <div class="so-col" id="so-right"></div>
  </div>
</div>

<script type="module">
// ── Firebase Config ──
const FB = {
  apiKey: "AIzaSyBukGl8KprWShSKyIuK6l4rfHM8kabKbwk",
  authDomain: "ffpstoebel.firebaseapp.com",
  databaseURL: "https://ffpstoebel-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ffpstoebel",
  appId: "1:899454609586:web:40465b0c61489f51cfc1ab"
};

// ── Sponsors ──
const SPONSORS = [
  { name: 'Raiffeisen Timelkam-Lenzing-Puchkirchen', logo: 'raika.svg' },
  { name: 'Fliesen Gaborek',  logo: 'gaborek.png' },
  { name: 'Atos Schiemer',    logo: 'logo-atos.gif' },
];

// ── State ──
let state = { teams:{}, rounds:{}, currentRound:0, settings:{} };
const tn = id => state.teams[id]?.name || id;

// ── Clock ──
const updateClock = () => {
  const n = new Date();
  document.getElementById('h-clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
};
setInterval(updateClock, 1000); updateClock();

// ── Firebase ──
async function init() {
  try {
    const { initializeApp, getApps, getApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const { getDatabase, ref, onValue }       = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    const app = getApps().length ? getApp() : initializeApp(FB);
    const db  = getDatabase(app);
    onValue(ref(db, '/tournament'), snap => {
      const d = snap.val() || {};
      state.teams        = d.teams        || {};
      state.rounds       = d.rounds       || {};
      state.currentRound = d.currentRound || 0;
      state.settings     = d.settings     || {};
      document.getElementById('status-dot').style.background = '#4cff88';
      document.getElementById('status-txt').textContent = 'Live';
      renderAll();
    }, err => {
      document.getElementById('status-dot').style.background = '#e74c3c';
      document.getElementById('status-txt').textContent = 'Fehler: ' + err.message;
    });
  } catch(e) {
    document.getElementById('status-dot').style.background = '#e74c3c';
    document.getElementById('status-txt').textContent = 'Fehler: ' + e.message;
  }
}

// ── Standings calc ──
function calcStandings() {
  const ids = Object.keys(state.teams);
  if (!ids.length) return [];
  const s = {};
  ids.forEach(id => s[id] = {pts:0,wins:0,draws:0,losses:0,diff:0,played:0});
  Object.values(state.rounds).forEach(round => {
    if (!Array.isArray(round)) return;
    round.forEach(m => {
      if (m.bye) { if (s[m.team1]) s[m.team1].played++; return; }
      if (m.score1===undefined||!s[m.team1]||!s[m.team2]) return;
      const [t1,t2,s1,s2] = [m.team1,m.team2,m.score1,m.score2];
      s[t1].played++; s[t2].played++;
      s[t1].diff+=s1-s2; s[t2].diff+=s2-s1;
      if (s1>s2) { s[t1].pts+=2; s[t1].wins++; s[t2].losses++; }
      else if (s2>s1) { s[t2].pts+=2; s[t2].wins++; s[t1].losses++; }
      else { s[t1].pts++; s[t2].pts++; s[t1].draws++; s[t2].draws++; }
    });
  });
  return ids.map(id=>({id,name:state.teams[id]?.name||id,...s[id]}))
            .sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.wins-a.wins||a.name.localeCompare(b.name));
}

// ── Render pairings ──
function renderPairings() {
  const grid = document.getElementById('pairing-grid');
  const round = state.rounds[state.currentRound];
  document.getElementById('h-round').textContent = state.currentRound || '–';
  document.getElementById('h-title').textContent = '🔥 ' + (state.settings?.title || 'Stöbelturnier 2026');
  document.getElementById('so-round').textContent = state.currentRound || '–';

  if (!round?.length) {
    grid.innerHTML = '<div style="color:#999;font-size:2.5rem;padding:60px;grid-column:1/-1">Noch keine Paarungen</div>';
    document.getElementById('open-count').textContent = '';
    return;
  }

  const byes  = round.filter(m => m.bye);
  const open  = round.filter(m => !m.bye && m.score1===undefined);
  const done  = round.filter(m => !m.bye && m.score1!==undefined);
  const sorted = [...byes, ...open, ...done];

  const total = open.length + done.length;
  document.getElementById('open-count').textContent =
    open.length > 0 ? `· ${done.length}/${total} eingetragen` : `· Alle ${total} ✓`;

  // Dynamic rows
  const cols = 5;
  const rows = Math.ceil(sorted.filter(m=>!m.bye).length / cols);
  grid.style.gridTemplateRows = `repeat(${rows},1fr)`;

  grid.innerHTML = sorted.map(m => {
    if (m.bye) return `
      <div class="pc done pc-bye">
        <div class="pc-field">📍 Freirunde</div>
        <div class="pc-team-row"><div class="pc-team">${tn(m.team1)}</div><div class="pc-score open-s">–</div></div>
        <div class="pc-team-row"><div class="pc-team" style="color:#bbb">–</div><div class="pc-score open-s">–</div></div>
      </div>`;
    const isOpen = m.score1 === undefined;
    const field = m.field ? `📍 Feld ${m.field}` : '📍';
    if (isOpen) return `
      <div class="pc open">
        <div class="pc-field">${field}</div>
        <div class="pc-team-row"><div class="pc-team">${tn(m.team1)}</div><div class="pc-score open-s">–</div></div>
        <div class="pc-team-row"><div class="pc-team">${tn(m.team2)}</div><div class="pc-score open-s">–</div></div>
      </div>`;
    const s1c = m.score1>m.score2?'win':m.score1<m.score2?'loss':'';
    const s2c = m.score2>m.score1?'win':m.score2<m.score1?'loss':'';
    return `
      <div class="pc done">
        <div class="pc-field">${field}</div>
        <div class="pc-team-row"><div class="pc-team">${tn(m.team1)}</div><div class="pc-score ${s1c}">${m.score1}</div></div>
        <div class="pc-team-row"><div class="pc-team">${tn(m.team2)}</div><div class="pc-score ${s2c}">${m.score2}</div></div>
      </div>`;
  }).join('');
}

// ── Render standings overlay ──
function renderStandings() {
  const left  = document.getElementById('so-left');
  const right = document.getElementById('so-right');
  if (!left) return;
  const data = calcStandings();
  if (!data.length) { left.innerHTML='<div style="color:#999;font-size:3vh;padding:4vh">Noch keine Ergebnisse</div>'; right.innerHTML=''; return; }

  const maxP = data[0].pts, minP = data[data.length-1].pts, spread = maxP-minP||1;
  const topT = maxP - Math.max(2, Math.round(spread*0.2));
  const botT = minP + Math.max(2, Math.round(spread*0.2));
  const zone = t => t.pts>=topT?'zt':t.pts<=botT?'zb':'zm';
  const icon = t => t.pts>=topT?'🏆':t.pts<=botT?'🍍':'';

  const rows = data.map((t,i) => {
    const rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const diff = t.diff>=0?`+${t.diff}`:String(t.diff);
    const dc = t.diff>=0?'#1a7a3c':'#c0181a';
    return `<div class="so-row ${zone(t)}">
      <div class="so-rank ${rc}">${i+1}</div>
      <div class="so-name">${icon(t)} ${t.name}</div>
      <div class="so-pts">${t.pts}</div>
      <div class="so-diff" style="color:${dc}">${diff}</div>
      <div class="so-rec">${t.wins}S ${t.draws}U ${t.losses}N</div>
    </div>`;
  });
  const half = Math.ceil(rows.length/2);
  left.innerHTML  = rows.slice(0,half).join('');
  right.innerHTML = rows.slice(half).join('');
}

function renderAll() { renderPairings(); renderStandings(); }

// ── Standings toggle ──
let showStandings = false;
function toggleStandings() {
  showStandings = !showStandings;
  document.getElementById('standings-overlay').classList.toggle('visible', showStandings);
}
document.addEventListener('keydown', e => { if (e.key==='t'||e.key==='T') toggleStandings(); });
if (new URLSearchParams(location.search).get('tabelle')==='1') toggleStandings();
window.toggleStandings = toggleStandings;

// ── Sponsors ──
function initSponsors() {
  const slides = document.getElementById('sponsor-slides');
  if (!SPONSORS.length) return;
  const makeSlide = s => s.logo
    ? `<div class="sponsor-slide"><img src="${s.logo}" alt="${s.name}" onerror="this.parentNode.innerHTML='<div class=\\"sponsor-name\\">${s.name}</div>'"></div>`
    : `<div class="sponsor-slide"><div class="sponsor-name">${s.name}</div></div>`;
  const minCopies = Math.max(2, Math.ceil(12/SPONSORS.length));
  let html='';
  for(let i=0;i<minCopies*2;i++) SPONSORS.forEach(s=>html+=makeSlide(s));
  slides.innerHTML=html;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const els=slides.querySelectorAll('.sponsor-slide');
    let hw=0; const half=Math.floor(els.length/2);
    for(let i=0;i<half;i++) hw+=els[i].offsetWidth||600;
    if(hw<100) hw=half*600;
    const dur=Math.max(30,SPONSORS.length*15);
    const st=document.createElement('style');
    st.textContent=`@keyframes ss{0%{transform:translateX(0)}100%{transform:translateX(-${hw}px)}}`;
    document.head.appendChild(st);
    slides.style.animation=`ss ${dur}s linear infinite`;
  }));
}

// ── Scale to screen ──
window.toggleStandings = toggleStandings;

// ── Init ──
init();
initSponsors();
</script>

<script>
function scaleToScreen() {
  const sx=window.innerWidth/3840, sy=window.innerHeight/2160, s=Math.min(sx,sy);
  document.body.style.transform=`scale(${s})`;
  document.body.style.transformOrigin='0 0';
  const ox=(window.innerWidth-3840*s)/2, oy=(window.innerHeight-2160*s)/2;
  document.body.style.marginLeft=ox+'px';
  document.body.style.marginTop=oy+'px';
  document.documentElement.style.background='#888';
}
scaleToScreen();
window.addEventListener('resize',scaleToScreen);
</script>
</body>
</html>
